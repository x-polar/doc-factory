# KORI Answers — 디자인 토큰 (www.xenoimpact.com 의 KORI/웹 아이덴티티 기반)
# 다크(블랙) 베이스 + 네온 민트 포인트 + Tomorrow 디스플레이 폰트.
# 회사 소개서(오렌지/Pretendard)와는 다른, 제품/웹 아이덴티티.
# 색은 '#' 없는 6자리 HEX.

meta:
  name: "KORI Answers"
  ratio: "16:9"

colors:
  primary:    "000000"   # 사이트 베이스 블랙
  secondary:  "22FFBD"
  accent:     "22FFBD"   # 네온 민트(사이트 포인트색)
  text:       "EDEDED"   # 다크 배경 위 본문
  muted:      "8A8A8A"   # 캡션·보조(사이트 그레이 계열)
  background: "000000"   # 콘텐츠 슬라이드 배경(블랙)
  on_primary: "FFFFFF"
  # 다크 테마 토큰
  title_ink:  "FFFFFF"   # 콘텐츠 제목(다크 위)
  bg_cover:   "000000"   # 표지 배경(블랙)
  on_cover:   "FFFFFF"
  bg_section: "0A0A0B"   # 섹션 구분 배경
  on_section: "22FFBD"   # 섹션 제목을 민트로(KORI 포인트)
  # 차트 시리즈 팔레트(민트 주도 + 중립)
  series: ["22FFBD", "6FE9CE", "2E9E86", "8A8A8A", "D5D5D5"]

fonts:
  heading:  "Tomorrow"      # 사이트 디스플레이 폰트(영문 테키). 한글은 폴백으로 렌더
  body:     "Pretendard"    # 본문 한글 가독성(미설치 시 폴백). 사이트 본문은 Monda
  fallback: "Noto Sans KR"

sizes:        # pt
  title:    28
  subtitle: 18
  body:     16
  caption:  11

slide:        # inches (16:9)
  width:  13.333
  height: 7.5
  margin: 0.7
