# 디자인 토큰 — 모든 덱의 색·폰트·여백 단일 진실원천(single source of truth).
# 지금 값은 중립적 기본값(placeholder). 브랜드 확정 시 이 파일만 교체하면
# deckbuilder가 전체 덱에 일괄 반영한다.
# 색은 '#' 없는 6자리 HEX.

meta:
  name: "Doc Factory Default"
  ratio: "16:9"

colors:
  primary:    "1F4E79"   # 메인(제목·강조)
  secondary:  "2E75B6"
  accent:     "C55A11"   # 포인트
  text:       "262626"   # 본문
  muted:      "808080"   # 캡션·보조
  background: "FFFFFF"
  on_primary: "FFFFFF"   # primary 배경 위 글자색
  # 차트 시리즈 팔레트(순서대로 사용)
  series: ["1F4E79", "2E75B6", "9DC3E6", "C55A11", "808080"]
  # --- 선택 토큰(생략 시 아래 폴백). 다크 테마 브랜드는 이걸로 배경/글자색 제어. ---
  # title_ink:  "1F4E79"   # 콘텐츠 슬라이드 제목색 (폴백: primary)
  # bg_cover:   "1F4E79"   # 표지 배경       (폴백: primary)
  # on_cover:   "FFFFFF"   # 표지 글자색     (폴백: on_primary)
  # bg_section: "C55A11"   # 섹션 구분 배경  (폴백: accent)
  # on_section: "FFFFFF"   # 섹션 글자색     (폴백: on_primary)
  # background  는 콘텐츠 슬라이드 배경(위에 정의됨, 폴백: FFFFFF)

# (선택) 로고 — 브랜드 폴더 기준 상대경로. 있으면 표지/푸터에 자동 삽입.
# logo:
#   cover:  "assets/logos/<brand>_typo.png"
#   footer: "assets/logos/<brand>_typo.png"

fonts:
  heading:  "Noto Sans KR"
  body:     "Noto Sans KR"
  fallback: "Arial"       # 폰트 미설치 환경 폴백

sizes:        # pt
  title:    28
  subtitle: 18
  body:     16
  caption:  11

slide:        # inches (16:9 = 13.333 x 7.5)
  width:  13.333
  height: 7.5
  margin: 0.7
