# Storyboard — 슬라이드별 스펙 (3단계)
# 콘텐츠와 디자인 분리: pptx-builder가 이 파일을 읽어 덱을 생성한다.
# 한 슬라이드 = 한 메시지. title은 결론을 말하는 action title.
#
# 필드:
#   n       슬라이드 번호
#   title   제목 = 핵심 메시지 (action title)
#   layout  레이아웃 유형 (title / title+body / title+chart / section / table ...)
#   body    본문 불릿 목록
#   chart   차트 데이터 파일 경로 (research/ 기준), 없으면 생략
#   image   삽입 이미지 경로, 없으면 생략
#   source  근거 출처 ID 목록 (research/sources.md)
#   notes   스피커 노트 (상세 설명은 본문이 아니라 여기에)

slides:
  - n: 1
    title: "<표지 제목>"
    layout: title
    body: ["<부제 / 작성자 / 날짜>"]
    notes: ""

  - n: 2
    title: "<핵심 메시지를 담은 action title>"
    layout: title+body
    body:
      - "<근거 불릿 1>"
      - "<근거 불릿 2>"
    source: [src-01]
    notes: "<상세 설명>"

  - n: 3
    title: "<예: 운영비 30% 절감>"
    layout: title+chart
    chart: research/cost_compare.csv
    source: [src-02, src-03]
    notes: ""
